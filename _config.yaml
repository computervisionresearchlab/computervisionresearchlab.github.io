# site properties and page defaults
title: CVRLAB
subtitle: Computer Vision Research Lab
description: Computer Vision Research Laboratory focuses on low-light image enhancement, thermal imaging, object tracking, leaf disease detection, and building efficient models for edge devices. We develop applied vision systems and compact neural models for real-world cameras, drones, and embedded platforms.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: contact@computervisionresearchlab.com
  orcid: 0000-0002-8362-3873
  google-scholar: uZD3PU4AAAAJ&hl
  github: computervisionresearchlab
  twitter: cvrlab_x
  youtube: ComputerVisionResearchLab

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
